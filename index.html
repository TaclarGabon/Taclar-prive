<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>TACLAR — Portail</title>
<style>
*{box-sizing:border-box}
body{margin:0;font-family:Arial,Helvetica,sans-serif;background:
radial-gradient(circle at top left,#0f766e 0,#061923 38%,#020617 100%);color:white;min-height:100vh}
.wrap{max-width:980px;margin:auto;padding:32px 18px}
.card{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.18);border-radius:30px;padding:28px;box-shadow:0 25px 70px #0008;backdrop-filter:blur(10px)}
.logo{width:150px;border-radius:26px;box-shadow:0 18px 35px #0006;border:3px solid #facc15}
.brand{display:flex;gap:22px;align-items:center;flex-wrap:wrap}
h1{font-size:54px;line-height:1;margin:10px 0 6px;letter-spacing:.02em}
.kicker{color:#facc15;font-weight:900;letter-spacing:.08em;text-transform:uppercase}
p{color:#cbd5e1;font-size:18px;line-height:1.5}
.grid{display:grid;grid-template-columns:repeat(5,1fr);gap:14px;margin-top:26px}
a{display:block;text-decoration:none;background:#e2e8f0;color:#07112b;border-radius:18px;padding:18px 14px;font-weight:900;text-align:center;box-shadow:0 10px 20px #0004}
a.primary{background:#0f766e;color:white}
a.gold{background:#facc15;color:#07112b}
.small{font-size:14px;color:#94a3b8;margin-top:22px}
@media(max-width:820px){.grid{grid-template-columns:1fr}h1{font-size:42px}}
</style>
</head>
<body>
<div class="wrap">
  <div class="card">
    <div class="brand">
      <img class="logo" src="logo_taclar.png" alt="TACLAR">
      <div>
        <div class="kicker">Portail TACLAR</div>
        <h1>TACLAR</h1>
        <p>Transport privé avec chauffeur partenaire. Choisissez votre accès.</p>
      </div>
    </div>
    <div class="grid">
      <a class="primary" href="client.html">Client</a>
      <a href="chauffeur.html">Chauffeur</a>
      <a href="dispatcher.html">Dispatcher</a>
      <a href="admin.html">Admin</a>
      <a class="gold" href="direction.html">Direction</a>
    </div>
    <p class="small">Version V34.2.2 — séparation visuelle des rôles. La base de données reste synchronisée avec Firebase.</p>
  </div>
</div>
</body>
</html>
